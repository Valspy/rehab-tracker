<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Реабилитация — трекер</title>
<style>
  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --surface2: #f0ede8;
    --border: #e2ddd7;
    --border2: #ccc8c0;
    --text: #1a1917;
    --text2: #6b6760;
    --text3: #9c9890;
    --green: #3d8b4e;
    --green-bg: #eaf4ec;
    --green-light: #d1ebd8;
    --amber: #b07a1a;
    --amber-bg: #fdf3dc;
    --radius: 10px;
    --radius-sm: 6px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #161614;
      --surface: #1f1f1d;
      --surface2: #2a2a27;
      --border: #2e2e2b;
      --border2: #3d3d39;
      --text: #f0ede8;
      --text2: #9c9890;
      --text3: #6b6760;
      --green: #5cb870;
      --green-bg: #1a2e1e;
      --green-light: #243829;
      --amber: #e0a830;
      --amber-bg: #2a2010;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; line-height: 1.5; min-height: 100vh; }
  .app { max-width: 520px; margin: 0 auto; padding: 24px 16px 60px; }
  .header { margin-bottom: 28px; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
  .header-sub { font-size: 13px; color: var(--text2); }
  .badge-stage { font-size: 11px; background: var(--amber-bg); color: var(--amber); border-radius: 20px; padding: 3px 10px; font-weight: 500; }
  .week-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
  .week-btn { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); width: 32px; height: 32px; cursor: pointer; color: var(--text2); font-size: 16px; display: flex; align-items: center; justify-content: center; }
  .week-btn:hover { background: var(--surface2); }
  .week-label { flex: 1; text-align: center; font-size: 13px; color: var(--text2); font-weight: 500; }
  .day-tabs { display: flex; gap: 5px; margin-bottom: 20px; }
  .day-tab { flex: 1; padding: 7px 0; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface); cursor: pointer; font-size: 12px; font-weight: 500; color: var(--text2); text-align: center; position: relative; }
  .day-tab.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .day-tab .dot { display: block; width: 5px; height: 5px; border-radius: 50%; background: var(--green); margin: 3px auto 0; opacity: 0; }
  .day-tab.has-done .dot { opacity: 1; }
  .day-tab.active .dot { background: var(--bg); opacity: 0.5; }
  .day-tab.gym-day { border-color: var(--amber); }
  .day-tab.gym-day.active { background: var(--amber); border-color: var(--amber); }
  .progress-row { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .progress-bar-wrap { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width 0.3s ease; }
  .progress-text { font-size: 12px; color: var(--text2); white-space: nowrap; min-width: 48px; text-align: right; }
  .blocks { display: flex; flex-direction: column; gap: 8px; }
  .block { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .block.all-done { border-color: var(--green-light); background: var(--green-bg); }
  .block-header { display: flex; align-items: center; gap: 10px; padding: 13px 14px; cursor: pointer; user-select: none; }
  .block-icon { font-size: 17px; width: 24px; text-align: center; flex-shrink: 0; }
  .block-title { flex: 1; font-size: 14px; font-weight: 500; }
  .block-meta { font-size: 12px; color: var(--text3); }
  .block.all-done .block-meta { color: var(--green); }
  .block-chevron { font-size: 12px; color: var(--text3); transition: transform 0.2s; flex-shrink: 0; }
  .block.open .block-chevron { transform: rotate(180deg); }
  .block-body { display: none; padding: 0 14px 14px; border-top: 1px solid var(--border); }
  .block.all-done .block-body { border-top-color: var(--green-light); }
  .block.open .block-body { display: block; }
  .ex-list { list-style: none; padding-top: 10px; display: flex; flex-direction: column; gap: 2px; }
  .ex-item { display: flex; align-items: flex-start; gap: 10px; padding: 7px 8px; border-radius: var(--radius-sm); cursor: pointer; }
  .ex-item:active { background: var(--surface2); }
  .ex-item.checked { opacity: 0.6; }
  .ex-cb { width: 17px; height: 17px; border: 1.5px solid var(--border2); border-radius: 4px; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; background: var(--surface); }
  .ex-item.checked .ex-cb { background: var(--green); border-color: var(--green); }
  .ex-item.checked .ex-cb::after { content: '✓'; font-size: 11px; color: white; font-weight: 700; }
  .ex-info { flex: 1; }
  .ex-label { font-size: 13px; color: var(--text); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .ex-item.checked .ex-label { text-decoration: line-through; color: var(--text2); }
  .ex-detail { font-size: 12px; color: var(--text3); margin-top: 1px; }
  .badge-new { font-size: 10px; background: var(--green-bg); color: var(--green); border-radius: 10px; padding: 1px 7px; font-weight: 600; white-space: nowrap; }
  /* Микроразминки — сессии */
  .micro-sessions { padding-top: 12px; display: flex; flex-direction: column; gap: 8px; }
  .micro-session { border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
  .micro-session.done { border-color: var(--green-light); background: var(--green-bg); }
  .micro-session-header { display: flex; align-items: center; gap: 10px; padding: 9px 12px; cursor: pointer; }
  .micro-session-title { flex: 1; font-size: 13px; font-weight: 500; }
  .micro-session.done .micro-session-title { color: var(--green); }
  .micro-session-chevron { font-size: 11px; color: var(--text3); transition: transform 0.2s; }
  .micro-session.open .micro-session-chevron { transform: rotate(180deg); }
  .micro-session-body { display: none; padding: 0 12px 10px; border-top: 1px solid var(--border); }
  .micro-session.done .micro-session-body { border-top-color: var(--green-light); }
  .micro-session.open .micro-session-body { display: block; }
  .micro-ex-list { list-style: none; padding-top: 8px; display: flex; flex-direction: column; gap: 2px; }
  .micro-ex-item { display: flex; align-items: center; gap: 10px; padding: 6px 6px; border-radius: var(--radius-sm); cursor: pointer; }
  .micro-ex-item:active { background: var(--surface2); }
  .micro-ex-item.checked { opacity: 0.6; }
  .micro-ex-cb { width: 15px; height: 15px; border: 1.5px solid var(--border2); border-radius: 3px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: var(--surface); }
  .micro-ex-item.checked .micro-ex-cb { background: var(--green); border-color: var(--green); }
  .micro-ex-item.checked .micro-ex-cb::after { content: '✓'; font-size: 10px; color: white; font-weight: 700; }
  .micro-ex-label { font-size: 12px; color: var(--text); }
  .micro-ex-item.checked .micro-ex-label { text-decoration: line-through; color: var(--text2); }
  /* Weekly */
  .section-title { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin: 28px 0 12px; }
  .weekly-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .wday { text-align: center; }
  .wday-label { font-size: 11px; color: var(--text3); margin-bottom: 5px; }
  .wday-circle { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border); margin: 0 auto; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: var(--text3); }
  .wday-circle.partial { background: var(--surface2); border-color: var(--border2); color: var(--text2); }
  .wday-circle.full { background: var(--green-bg); border-color: var(--green-light); color: var(--green); }
  .wday-circle.today { box-shadow: 0 0 0 2px var(--text); }
  /* Отёк */
  .oedema-row { display: flex; align-items: center; gap: 10px; margin-top: 28px; padding: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); flex-wrap: wrap; }
  .oedema-label { font-size: 13px; font-weight: 500; white-space: nowrap; }
  .oedema-scale { display: flex; gap: 4px; flex: 1; min-width: 200px; }
  .oedema-btn { flex: 1; height: 28px; border-radius: 4px; border: 1px solid var(--border); background: var(--surface2); font-size: 11px; font-weight: 600; cursor: pointer; color: var(--text2); }
  .oedema-btn.sel { background: var(--amber-bg); border-color: var(--amber); color: var(--amber); }
  .footer-note { margin-top: 32px; padding: 12px 14px; background: var(--surface2); border-radius: var(--radius-sm); font-size: 12px; color: var(--text2); line-height: 1.6; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <h1>🦵 Реабилитация</h1>
      <span class="badge-stage">7 месяцев</span>
    </div>
    <div class="header-sub" id="daySubtitle">Трекер ежедневных упражнений</div>
  </div>
  <div class="week-nav">
    <button class="week-btn" id="prevWeek">&#8249;</button>
    <span class="week-label" id="weekLabel"></span>
    <button class="week-btn" id="nextWeek">&#8250;</button>
  </div>
  <div class="day-tabs" id="dayTabs"></div>
  <div class="progress-row">
    <div class="progress-bar-wrap"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <span class="progress-text" id="progressText">0 / 0</span>
  </div>
  <div class="blocks" id="blocks"></div>
  <div class="oedema-row">
    <span class="oedema-label">Отёк вечером</span>
    <div class="oedema-scale" id="oedemaScale"></div>
  </div>
  <div class="section-title">Прогресс недели</div>
  <div class="weekly-grid" id="weeklyGrid"></div>
  <div class="footer-note">💾 Данные сохраняются в браузере. Очищаются только при полном сбросе Safari.</div>
</div>

<script>
var DAYS_SHORT = ['пн','вт','ср','чт','пт','сб','вс'];
// 0=пн,1=вт,2=ср,3=чт,4=пт,5=сб,6=вс
var GYM_DAYS = [0, 2, 4]; // пн, ср, пт
var GYM_TIMES = { 0: '9:00', 2: '10:00', 4: '9:00' }; // пн, ср, пт

var MICRO_EXERCISES = [
  { id: 'm1', label: 'Круги стопой — 10 повторений' },
  { id: 'm2', label: 'Движения стопой вверх-вниз — 10 повторений' },
  { id: 'm3', label: 'Вращения предплечья — 10 повторений' }
];
var MICRO_SESSIONS = [
  { id: 's1', time: '10:00' },
  { id: 's2', time: '12:00' },
  { id: 's3', time: '14:00' },
  { id: 's4', time: '16:00' }
];

var BLOCKS_COMMON = [
  {
    id: 'morning', icon: '🌅', title: 'Утренняя разминка', sub: '10 мин',
    exercises: [
      { id: 'ap', label: 'Качание стопой вверх-вниз', detail: '30 повторений' },
      { id: 'circles', label: 'Круги стопой', detail: '10 по часовой + 10 против' },
      { id: 'ktw', label: 'Колено к стене', detail: '2 × 10' },
      { id: 'calf1', label: 'Растяжка икроножной мышцы (прямая нога)', detail: '2 × 30 сек' },
      { id: 'calf2', label: 'Растяжка камбаловидной мышцы (согнутая нога)', detail: '2 × 30 сек' },
      { id: 'pron', label: 'Супинация и пронация предплечья', detail: '2 × 15' },
      { id: 'sup_hold', label: 'Удержание крайней супинации', detail: '3 × 20 сек' }
    ]
  },
  {
    id: 'micro', icon: '💻', title: 'Микроразминки', sub: '4 сессии в день', isMicro: true
  }
];

var BLOCKS_GYM = [
  {
    id: 'pregym', icon: '🏋️', title: 'Перед залом', sub: '10 мин',
    exercises: [
      { id: 'r2', label: 'Подъёмы на носки на двух ногах', detail: '2 × 15' },
      { id: 'inv', label: 'Инверсия стопы с резинкой', detail: '3 × 15' },
      { id: 'ev', label: 'Эверсия стопы с резинкой', detail: '3 × 15', isNew: true },
      { id: 'step', label: 'Подъём на платформу 10–15 см', detail: '3 × 10' },
      { id: 'bal_pre', label: 'Баланс', detail: '2 × 30 сек' }
    ]
  },
  {
    id: 'postgym', icon: '🧘', title: 'После тренировки', sub: '5–10 мин',
    exercises: [
      { id: 'str1', label: 'Растяжка икры — прямая нога', detail: '3 × 30 сек' },
      { id: 'str2', label: 'Растяжка икры — согнутая нога', detail: '3 × 30 сек' },
      { id: 'ktw2', label: 'Колено к стене', detail: '10 повторений' },
      { id: 'ecc', label: 'Эксцентрические подъёмы на носок', detail: '3 × 10 — подъём двумя, опускание больной ногой 4 сек', isNew: true },
      { id: 'r1', label: 'Подъёмы на носки на одной ноге', detail: '2 × 8' },
      { id: 'sup2', label: 'Супинация предплечья', detail: '2 × 15' }
    ]
  }
];

var BLOCKS_REST = [
  {
    id: 'lunch', icon: '☀️', title: 'После обеда — баланс', sub: '5 мин',
    exercises: [
      { id: 'bal1', label: 'Баланс на больной ноге', detail: '3 × 30 сек' },
      { id: 'bal2', label: 'Баланс с поворотами головы', detail: '2 × 20 сек' },
      { id: 'sf', label: 'Короткая стопа (подтягивание свода)', detail: '10 × 5 сек' }
    ]
  },
  {
    id: 'recovery', icon: '🔄', title: 'Активное восстановление', sub: '15 мин',
    exercises: [
      { id: 'rec_bal1', label: 'Баланс на одной ноге', detail: '3 × 45 сек' },
      { id: 'rec_bal2', label: 'Баланс на нестабильной поверхности', detail: '3 × 30 сек (подушка или сложенный коврик)' },
      { id: 'rec_sf', label: 'Короткая стопа (подтягивание свода)', detail: '10 × 5 сек' },
      { id: 'rec_ecc', label: 'Эксцентрические подъёмы на носок', detail: '3 × 10 — подъём двумя, опускание больной ногой 4 сек' },
      { id: 'rec_inv', label: 'Инверсия стопы с резинкой', detail: '3 × 15' },
      { id: 'rec_ev', label: 'Эверсия стопы с резинкой', detail: '3 × 15' },
      { id: 'rec_ktw', label: 'Колено к стене', detail: '2 × 10' },
      { id: 'rec_calf_raise', label: 'Подъём на носках', detail: '3 × 15' }
    ]
  }
];

var BLOCKS_EVENING = [
  {
    id: 'walk', icon: '🚶', title: 'Вечерняя прогулка', sub: '15–20 мин',
    exercises: [
      { id: 'wfwd', label: 'Ходьба вперёд — пятка, перекат, носок', detail: '15–20 мин, контроль хромоты' },
      { id: 'wback', label: 'Ретроходьба (назад)', detail: '2–3 мин в конце прогулки', isNew: true }
    ]
  },
  {
    id: 'evening', icon: '🌙', title: 'Перед сном', sub: '10–15 мин',
    exercises: [
      { id: 'legup', label: 'Нога вверх', detail: '15–20 мин при наличии отёка' },
      { id: 'ap2', label: 'Качание стопой вверх-вниз', detail: '50 повторений' },
      { id: 'massage', label: 'Лимфодренажный массаж снизу вверх', detail: '3–5 мин' },
      { id: 'sup3', label: 'Супинация предплечья', detail: '2 × 15' },
      { id: 'sup_str', label: 'Растяжка супинации', detail: '3 × 30 сек' }
    ]
  }
];

function getBlocksForDay(dayOffset) {
  var isGym = GYM_DAYS.indexOf(dayOffset) !== -1;
  var middle = isGym ? BLOCKS_GYM : BLOCKS_REST;
  return BLOCKS_COMMON.concat(middle).concat(BLOCKS_EVENING);
}

function dateToKey(d) {
  var y = d.getFullYear();
  var m = String(d.getMonth() + 1).padStart('0', 2);
  var day = String(d.getDate()).padStart('0', 2);
  return y + '-' + m + '-' + day;
}
String.prototype.padStart = function(fill, len) {
  var s = this;
  while (s.length < len) s = fill + s;
  return s;
};

function getWeekStart(d) {
  var clone = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  var dow = clone.getDay();
  var diff = (dow === 0) ? -6 : 1 - dow;
  clone.setDate(clone.getDate() + diff);
  return clone;
}
function dayKey(weekStart, offset) {
  var d = new Date(weekStart.getFullYear(), weekStart.getMonth(), weekStart.getDate() + offset);
  var y = d.getFullYear();
  var m = String(d.getMonth() + 1); if (m.length < 2) m = '0' + m;
  var day = String(d.getDate()); if (day.length < 2) day = '0' + day;
  return 'rehab_' + y + '-' + m + '-' + day;
}
function loadDay(key) { try { return JSON.parse(localStorage.getItem(key) || '{}'); } catch(e) { return {}; } }
function saveDay(key, data) { try { localStorage.setItem(key, JSON.stringify(data)); } catch(e) {} }
function loadOedema(key) { try { return localStorage.getItem('oedema_' + key) || ''; } catch(e) { return ''; } }
function saveOedema(key, val) { try { localStorage.setItem('oedema_' + key, val); } catch(e) {} }

var today = new Date();
var weekStart = getWeekStart(today);
function getTodayOffset() {
  var ws = getWeekStart(new Date());
  var t = new Date(); var td = new Date(t.getFullYear(), t.getMonth(), t.getDate());
  var wsd = new Date(ws.getFullYear(), ws.getMonth(), ws.getDate());
  return Math.round((td - wsd) / 86400000);
}
var selectedDay = getTodayOffset();
function isCurrentWeek() {
  return getWeekStart(new Date()).getTime() === weekStart.getTime();
}

function countDayTotal(dayOffset, data) {
  var blocks = getBlocksForDay(dayOffset);
  var total = 0, done = 0;
  blocks.forEach(function(b) {
    if (b.isMicro) {
      MICRO_SESSIONS.forEach(function(sess) {
        MICRO_EXERCISES.forEach(function(ex) {
          total++;
          if (data[sess.id + '_' + ex.id]) done++;
        });
      });
    } else {
      b.exercises.forEach(function(ex) {
        total++;
        if (data[ex.id]) done++;
      });
    }
  });
  return { total: total, done: done };
}

function renderWeekLabel() {
  var end = new Date(weekStart.getFullYear(), weekStart.getMonth(), weekStart.getDate() + 6);
  function fmt(d) { return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' }); }
  document.getElementById('weekLabel').textContent = fmt(weekStart) + ' – ' + fmt(end);
}

function renderDayTabs() {
  var container = document.getElementById('dayTabs');
  container.innerHTML = '';
  var todayOff = isCurrentWeek() ? getTodayOffset() : -1;
  for (var i = 0; i < 7; i++) {
    var key = dayKey(weekStart, i);
    var data = loadDay(key);
    var counts = countDayTotal(i, data);
    var isGym = GYM_DAYS.indexOf(i) !== -1;
    var btn = document.createElement('button');
    btn.className = 'day-tab' +
      (i === selectedDay ? ' active' : '') +
      (counts.done > 0 ? ' has-done' : '') +
      (isGym ? ' gym-day' : '');
    if (i === todayOff) btn.style.fontWeight = '700';
    btn.innerHTML = DAYS_SHORT[i] + '<span class="dot"></span>';
    (function(idx) { btn.onclick = function() { selectedDay = idx; renderAll(); }; })(i);
    container.appendChild(btn);
  }
}

function renderBlocks() {
  var key = dayKey(weekStart, selectedDay);
  var data = loadDay(key);
  var blocks = getBlocksForDay(selectedDay);
  var container = document.getElementById('blocks');
  container.innerHTML = '';

  var isGym = GYM_DAYS.indexOf(selectedDay) !== -1;
  var sub = document.getElementById('daySubtitle');
  sub.textContent = isGym ? '🏋️ День тренировки — ' + GYM_TIMES[selectedDay] : '🔄 День восстановления';

  var totalDone = 0, totalAll = 0;

  blocks.forEach(function(block) {
    var div = document.createElement('div');

    if (block.isMicro) {
      // Подсчёт микроразминок
      var microDone = 0, microTotal = MICRO_SESSIONS.length * MICRO_EXERCISES.length;
      MICRO_SESSIONS.forEach(function(sess) {
        MICRO_EXERCISES.forEach(function(ex) {
          if (data[sess.id + '_' + ex.id]) microDone++;
        });
      });
      totalDone += microDone;
      totalAll += microTotal;
      var sessDone = 0;
      MICRO_SESSIONS.forEach(function(sess) {
        var allEx = MICRO_EXERCISES.every(function(ex) { return data[sess.id + '_' + ex.id]; });
        if (allEx) sessDone++;
      });
      var allBlockDone = sessDone === MICRO_SESSIONS.length;

      div.className = 'block' + (allBlockDone ? ' all-done' : '');
      var header = document.createElement('div');
      header.className = 'block-header';
      header.innerHTML =
        '<span class="block-icon">' + block.icon + '</span>' +
        '<span class="block-title">' + block.title + '</span>' +
        '<span class="block-meta">' + (allBlockDone ? '✓ готово' : sessDone + '/4 сессий · ' + block.sub) + '</span>' +
        '<span class="block-chevron">▾</span>';
      header.onclick = function() { div.classList.toggle('open'); };
      div.appendChild(header);

      var body = document.createElement('div');
      body.className = 'block-body';
      var sessContainer = document.createElement('div');
      sessContainer.className = 'micro-sessions';

      MICRO_SESSIONS.forEach(function(sess) {
        var exDone = MICRO_EXERCISES.filter(function(ex) { return data[sess.id + '_' + ex.id]; }).length;
        var sessComplete = exDone === MICRO_EXERCISES.length;
        var sessDiv = document.createElement('div');
        sessDiv.className = 'micro-session' + (sessComplete ? ' done' : '');
        var sessHeader = document.createElement('div');
        sessHeader.className = 'micro-session-header';
        sessHeader.innerHTML =
          '<span class="micro-session-title">' + sess.time + (sessComplete ? ' — выполнено ✓' : '') + '</span>' +
          '<span class="micro-session-chevron">▾</span>';
        sessHeader.onclick = function(e) { e.stopPropagation(); sessDiv.classList.toggle('open'); };
        sessDiv.appendChild(sessHeader);

        var sessBody = document.createElement('div');
        sessBody.className = 'micro-session-body';
        var ul = document.createElement('ul');
        ul.className = 'micro-ex-list';
        MICRO_EXERCISES.forEach(function(ex) {
          var checked = !!data[sess.id + '_' + ex.id];
          var li = document.createElement('li');
          li.className = 'micro-ex-item' + (checked ? ' checked' : '');
          li.innerHTML = '<div class="micro-ex-cb"></div><span class="micro-ex-label">' + ex.label + '</span>';
          (function(sid, eid, el) {
            el.onclick = function(e) {
              e.stopPropagation();
              var d = loadDay(key);
              d[sid + '_' + eid] = !d[sid + '_' + eid];
              saveDay(key, d);
              renderBlocks();
              renderProgress(key);
              renderWeeklyGrid();
            };
          })(sess.id, ex.id, li);
          ul.appendChild(li);
        });
        sessBody.appendChild(ul);
        sessDiv.appendChild(sessBody);
        sessContainer.appendChild(sessDiv);
      });

      body.appendChild(sessContainer);
      div.appendChild(body);

    } else {
      var blockDone = block.exercises.filter(function(e) { return data[e.id]; }).length;
      totalDone += blockDone;
      totalAll += block.exercises.length;
      var allDone = blockDone === block.exercises.length;

      div.className = 'block' + (allDone ? ' all-done' : '');
      var header = document.createElement('div');
      header.className = 'block-header';
      header.innerHTML =
        '<span class="block-icon">' + block.icon + '</span>' +
        '<span class="block-title">' + block.title + '</span>' +
        '<span class="block-meta">' + (allDone ? '✓ готово' : blockDone + '/' + block.exercises.length + ' · ' + block.sub) + '</span>' +
        '<span class="block-chevron">▾</span>';
      header.onclick = function() { div.classList.toggle('open'); };
      div.appendChild(header);

      var body = document.createElement('div');
      body.className = 'block-body';
      var ul = document.createElement('ul');
      ul.className = 'ex-list';
      block.exercises.forEach(function(ex) {
        var checked = !!data[ex.id];
        var li = document.createElement('li');
        li.className = 'ex-item' + (checked ? ' checked' : '');
        li.innerHTML =
          '<div class="ex-cb"></div>' +
          '<div class="ex-info">' +
            '<div class="ex-label">' + ex.label + (ex.isNew ? '<span class="badge-new">новое</span>' : '') + '</div>' +
            '<div class="ex-detail">' + ex.detail + '</div>' +
          '</div>';
        (function(exId, el) {
          el.onclick = function(e) {
            e.stopPropagation();
            var d = loadDay(key);
            d[exId] = !d[exId];
            saveDay(key, d);
            // Обновить только этот элемент не закрывая блок
            el.className = 'ex-item' + (d[exId] ? ' checked' : '');
            // Пересчитать заголовок блока
            var newDone = block.exercises.filter(function(e2) { return d[e2.id]; }).length;
            var newAll = newDone === block.exercises.length;
            div.className = 'block open' + (newAll ? ' all-done' : '');
            header.querySelector('.block-meta').textContent = newAll ? '✓ готово' : newDone + '/' + block.exercises.length + ' · ' + block.sub;
            renderProgress(key);
            renderWeeklyGrid();
            renderDayTabs();
          };
        })(ex.id, li);
        ul.appendChild(li);
      });
      body.appendChild(ul);
      div.appendChild(body);
    }

    container.appendChild(div);
  });

  renderProgress(key);
}

function renderProgress(key) {
  var data = loadDay(key);
  var counts = countDayTotal(selectedDay, data);
  var pct = counts.total > 0 ? Math.round(counts.done / counts.total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = counts.done + ' / ' + counts.total;
}

function renderOedema() {
  var key = dayKey(weekStart, selectedDay);
  var cur = loadOedema(key);
  var scale = document.getElementById('oedemaScale');
  scale.innerHTML = '';
  for (var i = 0; i <= 10; i++) {
    var btn = document.createElement('button');
    btn.className = 'oedema-btn' + (String(i) === cur ? ' sel' : '');
    btn.textContent = i;
    (function(val, k) {
      btn.onclick = function() { saveOedema(k, String(val)); renderOedema(); };
    })(i, key);
    scale.appendChild(btn);
  }
}

function renderWeeklyGrid() {
  var grid = document.getElementById('weeklyGrid');
  grid.innerHTML = '';
  var todayOff = isCurrentWeek() ? getTodayOffset() : -1;
  for (var i = 0; i < 7; i++) {
    var key = dayKey(weekStart, i);
    var data = loadDay(key);
    var counts = countDayTotal(i, data);
    var pct = counts.done > 0 ? Math.round(counts.done / counts.total * 100) : 0;
    var circleClass = counts.done === 0 ? '' : (counts.done >= counts.total ? 'full' : 'partial');
    var todayClass = (i === todayOff) ? ' today' : '';
    var cell = document.createElement('div');
    cell.className = 'wday';
    cell.innerHTML =
      '<div class="wday-label">' + DAYS_SHORT[i] + '</div>' +
      '<div class="wday-circle ' + circleClass + todayClass + '">' + (pct > 0 ? pct + '%' : '') + '</div>';
    grid.appendChild(cell);
  }
}

function renderAll() {
  renderWeekLabel();
  renderDayTabs();
  renderBlocks();
  renderOedema();
  renderWeeklyGrid();
}

document.getElementById('prevWeek').onclick = function() {
  weekStart = new Date(weekStart.getFullYear(), weekStart.getMonth(), weekStart.getDate() - 7);
  renderAll();
};
document.getElementById('nextWeek').onclick = function() {
  weekStart = new Date(weekStart.getFullYear(), weekStart.getMonth(), weekStart.getDate() + 7);
  renderAll();
};

renderAll();
</script>
</body>
</html>
